# Thoth Data Schema — SME Journey
# Version: 0.1
# Author: [your name]
# Purpose: This file tells your backend teammate exactly what tables
#          to create in Supabase to support the SME intake flow.
#          They can copy the SQL at the bottom directly into the
#          Supabase SQL Editor and run it.

# ─────────────────────────────────────────────────────────────
# WHAT "BUILDING A TABLE" MEANS
# ─────────────────────────────────────────────────────────────
# A database table is like a spreadsheet:
#   - Columns = fields (e.g., name, email, domain)
#   - Rows    = records (e.g., one row per SME)
# "Building a table" = telling the database what columns exist,
#   what type each column is, and which columns link to other tables.
#
# We have 4 tables total for the SME journey. The first 3 were
# discussed in earlier conversations. The 4th (interview_sessions)
# is new — it tracks the multi-turn interview state.

# ─────────────────────────────────────────────────────────────
# TABLE 1: sme_profiles
# ─────────────────────────────────────────────────────────────
# Purpose: Store one row per SME. This is routing metadata.
# Populated by: Screens 3-4 of the prototype (extraction + exclusions).
# Used for: When a student asks a question, Thoth queries this table
#           to figure out WHO to route to.

table: sme_profiles
description: "One row per SME. Routing metadata — who owns what."

fields:
  - name: sme_id
    type: UUID
    required: yes
    primary_key: yes
    note: "Unique ID, auto-generated when SME is onboarded"

  - name: full_name
    type: TEXT
    required: yes
    example: "Patrick Chidsey"

  - name: email
    type: TEXT
    required: yes
    unique: yes
    example: "chidsey@uw.edu"

  - name: title
    type: TEXT
    required: no
    example: "Assistant Director, Career Services & Industry Engagement"

  - name: domain
    type: TEXT (enum-like)
    required: yes
    allowed_values: [academics, career_services, facilities, prototyping_lab, admissions, it_purchasing, student_wellbeing, other]
    note: "From Profile Module 1 (single select)"

  - name: topics
    type: JSONB (array of strings)
    required: yes
    example: ["internship_search", "cpt_applications", "career_coaching"]
    note: "From Profile Module 2 (multi-select)"

  - name: exclusions
    type: JSONB (array of objects)
    required: no
    example: |
      [
        { "topic": "visa_status_decisions", "route_to": "iss_office" },
        { "topic": "course_petitions", "route_to": "sme_kara_fichthorn" }
      ]
    note: "From Profile Module 3. Critical for routing accuracy."

  - name: routing_preferences
    type: JSONB (array of objects, ordered)
    required: yes
    example: |
      [
        { "channel": "teams", "priority": 1 },
        { "channel": "email", "priority": 2, "sla_hours": 24 },
        { "channel": "scheduling_link", "priority": 3, "url": "https://..." }
      ]
    note: "From Profile Module 4. Ordered by preference."

  - name: availability
    type: TEXT
    required: no
    example: "M-F 10am-4:30pm, by appointment"

  - name: profile_source_input
    type: TEXT
    required: no
    note: "What the SME pasted originally (URL, signature, etc.). Debugging only — not shown to end users."

  - name: created_at
    type: TIMESTAMP
    auto: yes

  - name: last_reviewed_at
    type: TIMESTAMP
    required: no
    note: "When SME last confirmed this profile is accurate"

  - name: next_review_due
    type: TIMESTAMP
    required: no
    note: "Auto-set to 90 or 180 days out. Triggers re-interview prompt."


# ─────────────────────────────────────────────────────────────
# TABLE 2: knowledge_entries
# ─────────────────────────────────────────────────────────────
# Purpose: Store the actual knowledge — the Q&A pairs that Thoth
#          uses to answer student questions. One row per entry.
# Populated by: Screen 7 of the prototype (synthesis + approval).
# Used for: When a student asks a question, Thoth does vector
#           search on this table to find relevant answers.

table: knowledge_entries
description: "One row per approved Q&A entry. This is what students' questions hit."

fields:
  - name: entry_id
    type: UUID
    required: yes
    primary_key: yes

  - name: sme_id
    type: UUID (foreign key → sme_profiles.sme_id)
    required: yes
    note: "Who owns this entry"

  - name: topic_tag
    type: TEXT
    required: yes
    example: "cpt_applications"
    note: "Must match one of the topics in sme_profiles.topics"

  - name: question_framing
    type: TEXT
    required: yes
    example: "When should an F-1 student start their CPT application?"
    note: "How a student might phrase this question"

  - name: synthesized_answer
    type: TEXT
    required: yes
    note: "The LLM-generated, SME-approved answer"

  - name: supporting_doc_ids
    type: JSONB (array of UUIDs)
    required: no
    note: "Links to uploaded PDFs in Supabase Storage"

  - name: exposable_to_users
    type: BOOLEAN
    required: yes
    default: true
    note: |
      If FALSE, Thoth will NOT answer directly — it routes to SME.
      Use FALSE for case-by-case topics (e.g., fee waivers).

  - name: raw_transcript_id
    type: UUID (foreign key → raw_transcripts.transcript_id)
    required: no
    note: "Links back to the interview this entry came from. NEVER exposed to end users."

  - name: embedding
    type: VECTOR(1536)  # or 768 depending on embedding model
    required: yes
    note: "For semantic search. Generated from question_framing + synthesized_answer. Requires pgvector extension."

  - name: status
    type: TEXT (enum-like)
    required: yes
    allowed_values: [draft, pending_review, approved, rejected, stale]
    default: draft

  - name: approved_by_sme_id
    type: UUID
    required: no
    note: "Which SME approved this. Usually same as sme_id."

  - name: approved_at
    type: TIMESTAMP
    required: no

  - name: next_review_due
    type: TIMESTAMP
    required: no
    note: "When this entry should be re-validated by the SME"

  - name: created_at
    type: TIMESTAMP
    auto: yes


# ─────────────────────────────────────────────────────────────
# TABLE 3: raw_transcripts
# ─────────────────────────────────────────────────────────────
# Purpose: Store the full interview conversation. Never exposed
#          to end users. Used for audit and re-synthesis.
# Populated by: Screens 5-6 of the prototype (during interview).

table: raw_transcripts
description: "Full interview transcripts. Internal only — never shown to students."

fields:
  - name: transcript_id
    type: UUID
    required: yes
    primary_key: yes

  - name: sme_id
    type: UUID (foreign key → sme_profiles.sme_id)
    required: yes

  - name: session_id
    type: UUID (foreign key → interview_sessions.session_id)
    required: yes

  - name: messages
    type: JSONB (array of objects)
    required: yes
    example: |
      [
        { "role": "thoth", "content": "Walk me through...", "timestamp": "2026-04-24T10:00:00Z" },
        { "role": "sme", "content": "The big one is TECHIN 601...", "timestamp": "2026-04-24T10:01:30Z" }
      ]

  - name: uploaded_doc_ids
    type: JSONB (array of UUIDs)
    required: no
    note: "PDFs uploaded during this interview"

  - name: synthesized_entry_ids
    type: JSONB (array of UUIDs)
    required: no
    note: "Which knowledge_entries were derived from this transcript"

  - name: created_at
    type: TIMESTAMP
    auto: yes


# ─────────────────────────────────────────────────────────────
# TABLE 4: interview_sessions
# ─────────────────────────────────────────────────────────────
# Purpose: Track WHERE the SME is in the multi-step flow.
#          This is your "session state machine" from the architecture.
# Populated by: Every screen of the prototype.
# Used for: If SME leaves and comes back, resume where they stopped.

table: interview_sessions
description: "Tracks the SME's progress through the intake flow."

fields:
  - name: session_id
    type: UUID
    required: yes
    primary_key: yes

  - name: sme_id
    type: UUID (foreign key → sme_profiles.sme_id)
    required: no
    note: "Null until Profile is created in Screen 3"

  - name: stage
    type: TEXT (enum-like)
    required: yes
    allowed_values:
      - input_received         # Screen 1
      - extracting             # Screen 2 (LLM parsing)
      - profile_review         # Screen 3
      - boundaries_routing     # Screen 4
      - interview_active       # Screens 5-6
      - synthesis_review       # Screen 7
      - completed              # Screen 8

  - name: message_history
    type: JSONB (array of objects)
    required: no
    note: "Running log of LLM + SME turns for the current session"

  - name: draft_profile
    type: JSONB
    required: no
    note: "In-progress profile fields before SME approves and writes to sme_profiles"

  - name: draft_entries
    type: JSONB (array of objects)
    required: no
    note: "In-progress knowledge entries before approval in Screen 7"

  - name: created_at
    type: TIMESTAMP
    auto: yes

  - name: updated_at
    type: TIMESTAMP
    auto: yes


# ─────────────────────────────────────────────────────────────
# RELATIONSHIPS (how tables link together)
# ─────────────────────────────────────────────────────────────
#
#   interview_sessions ──(sme_id)──► sme_profiles
#                                         │
#                                         │ (sme_id)
#                                         ▼
#                                   knowledge_entries
#                                         │
#                                         │ (raw_transcript_id)
#                                         ▼
#                                    raw_transcripts ◄──(session_id)── interview_sessions
#
# Data flow:
#   1. SME opens prototype → create interview_sessions row (stage=input_received)
#   2. After Screen 4 approval → create sme_profiles row, update session (stage=interview_active)
#   3. Interview turns → append to interview_sessions.message_history
#   4. Interview ends → write raw_transcripts row
#   5. Screen 7 approval → write knowledge_entries rows linked to both
#   6. Screen 8 → update session (stage=completed)


# ─────────────────────────────────────────────────────────────
# RUNNABLE SQL (for Supabase SQL Editor)
# Your backend teammate pastes this into Supabase → SQL Editor
# → "New query" → paste → Run.
# ─────────────────────────────────────────────────────────────

sql: |
  -- Enable UUID generation and vector search
  CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
  CREATE EXTENSION IF NOT EXISTS vector;

  -- Table 1: SME Profiles
  CREATE TABLE sme_profiles (
    sme_id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
    full_name TEXT NOT NULL,
    email TEXT NOT NULL UNIQUE,
    title TEXT,
    domain TEXT NOT NULL CHECK (domain IN (
      'academics', 'career_services', 'facilities', 'prototyping_lab',
      'admissions', 'it_purchasing', 'student_wellbeing', 'other'
    )),
    topics JSONB NOT NULL DEFAULT '[]'::jsonb,
    exclusions JSONB DEFAULT '[]'::jsonb,
    routing_preferences JSONB NOT NULL DEFAULT '[]'::jsonb,
    availability TEXT,
    profile_source_input TEXT,
    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
    last_reviewed_at TIMESTAMPTZ,
    next_review_due TIMESTAMPTZ
  );

  -- Table 4: Interview Sessions (needed before raw_transcripts for FK)
  CREATE TABLE interview_sessions (
    session_id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
    sme_id UUID REFERENCES sme_profiles(sme_id) ON DELETE CASCADE,
    stage TEXT NOT NULL CHECK (stage IN (
      'input_received', 'extracting', 'profile_review', 'boundaries_routing',
      'interview_active', 'synthesis_review', 'completed'
    )),
    message_history JSONB DEFAULT '[]'::jsonb,
    draft_profile JSONB,
    draft_entries JSONB DEFAULT '[]'::jsonb,
    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
    updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
  );

  -- Table 3: Raw Transcripts
  CREATE TABLE raw_transcripts (
    transcript_id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
    sme_id UUID NOT NULL REFERENCES sme_profiles(sme_id) ON DELETE CASCADE,
    session_id UUID NOT NULL REFERENCES interview_sessions(session_id) ON DELETE CASCADE,
    messages JSONB NOT NULL,
    uploaded_doc_ids JSONB DEFAULT '[]'::jsonb,
    synthesized_entry_ids JSONB DEFAULT '[]'::jsonb,
    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
  );

  -- Table 2: Knowledge Entries (with pgvector column)
  CREATE TABLE knowledge_entries (
    entry_id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
    sme_id UUID NOT NULL REFERENCES sme_profiles(sme_id) ON DELETE CASCADE,
    topic_tag TEXT NOT NULL,
    question_framing TEXT NOT NULL,
    synthesized_answer TEXT NOT NULL,
    supporting_doc_ids JSONB DEFAULT '[]'::jsonb,
    exposable_to_users BOOLEAN NOT NULL DEFAULT TRUE,
    raw_transcript_id UUID REFERENCES raw_transcripts(transcript_id) ON DELETE SET NULL,
    embedding VECTOR(1536),
    status TEXT NOT NULL DEFAULT 'draft' CHECK (status IN (
      'draft', 'pending_review', 'approved', 'rejected', 'stale'
    )),
    approved_by_sme_id UUID REFERENCES sme_profiles(sme_id),
    approved_at TIMESTAMPTZ,
    next_review_due TIMESTAMPTZ,
    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
  );

  -- Indexes for fast lookup
  CREATE INDEX idx_sme_domain ON sme_profiles(domain);
  CREATE INDEX idx_entries_sme ON knowledge_entries(sme_id);
  CREATE INDEX idx_entries_status ON knowledge_entries(status);
  CREATE INDEX idx_entries_topic ON knowledge_entries(topic_tag);
  CREATE INDEX idx_sessions_stage ON interview_sessions(stage);

  -- Vector similarity index (for RAG retrieval)
  CREATE INDEX idx_entries_embedding ON knowledge_entries
    USING ivfflat (embedding vector_cosine_ops) WITH (lists = 100);


# ─────────────────────────────────────────────────────────────
# WHAT YOUR TEAMMATE NEEDS TO DO
# ─────────────────────────────────────────────────────────────
# 1. Create a Supabase project (if not done)
# 2. Go to Supabase dashboard → SQL Editor
# 3. Copy the `sql:` block above
# 4. Paste and run
# 5. Verify tables exist in Supabase → Table Editor
#
# You (the SME Journey owner) then write to these tables via
# the Supabase JS/Python SDK as the SME progresses through screens.
